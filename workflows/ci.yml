name: CI Pipeline MLflow to Docker

on:
  push:
    paths:
      - 'MLProject_folder/**'
      - '.github/workflows/ci.yml'
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Python 3.12.7
        uses: actions/setup-python@v5
        with:
          python-version: '3.12.7'

      - name: Install MLflow
        run: |
          python -m pip install --upgrade pip
          pip install mlflow==2.19.0

      - name: Run MLflow Project
        run: |
          # Mengeksekusi training menggunakan MLProject
          mlflow run MLProject_folder/

      - name: Upload Artifact to GitHub
        uses: actions/upload-artifact@v4
        with:
          name: mlflow-artifacts
          path: mlruns/

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and Push Docker Image
        run: |
          # 1. Mengambil Run ID terbaru secara dinamis dari folder mlruns
          RUN_ID=$(ls -td mlruns/0/* | head -1 | awk -F/ '{print $3}')
          echo "Ditemukan Run ID: $RUN_ID"
          
          # 2. Menentukan nama image (pastikan formatnya username/nama-image:tag)
          IMAGE_NAME="${{ secrets.DOCKER_USERNAME }}/weather-model:latest"
          echo "Membangun Docker Image: $IMAGE_NAME"
          
          # 3. Build image menggunakan MLflow
          mlflow models build-docker -m "runs:/$RUN_ID/model" -n $IMAGE_NAME
          
          # 4. Push image ke Docker Hub
          docker push $IMAGE_NAME